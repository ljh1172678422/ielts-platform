# 生产统一 nginx 网关配置（Phase 12.3，system-architecture §1.2）
#
# 路由策略（单域名路径分发）：
#   /          → user-web SPA（用户端）
#   /admin/    → admin-web SPA（管理后台）
#   /api/      → backend:8000（FastAPI）
#
# HTTPS：443 由 nginx 终止，证书来自 Let's Encrypt（Certbot webroot）
# HTTP 80：重定向到 443（除 acme-challenge 证书签发路径）
#
# 部署：证书路径 /etc/letsencrypt 挂载自宿主机，首次部署用 Certbot 签发

# ---------------------------------------------------------------------------
# HTTP → HTTPS 重定向 + Certbot 证书签发入口
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name _;

    # Certbot ACME 验证（证书签发/续签，必须走 80 端口）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余请求重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS 主入口（user-web + admin-web + /api 反代）
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # SSL 证书（首次部署前需先用 Certbot 签发，或放占位自签证书启动）
    # 生产路径：/etc/letsencrypt/live/$DOMAIN/fullchain.pem
    ssl_certificate     /etc/letsencrypt/live/ielts/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ielts/privkey.pem;

    # TLS 安全配置（Mozilla Intermediate）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全响应头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # gzip 压缩（静态资源）
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ---------- /api/ 反代到 backend ----------
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 录音上传大小限制（common.md §6.2：50MB，留余量）
        client_max_body_size 60m;
        # 长连接超时（录音上传可能较慢）
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ---------- /admin/ → admin-web SPA（子路径部署）----------
    # alias 映射：/admin/ → /usr/share/nginx/admin-web/
    location /admin/ {
        alias /usr/share/nginx/admin-web/;
        index index.html;
        # SPA history 模式 fallback（子路径需带 /admin/ 前缀）
        try_files $uri $uri/ /admin/index.html;
    }

    # ---------- / → user-web SPA（根路径）----------
    location / {
        root /usr/share/nginx/user-web;
        index index.html;
        # SPA history 模式 fallback
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存（hash 文件名，长期缓存）
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
