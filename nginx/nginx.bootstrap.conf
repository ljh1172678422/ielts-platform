# Bootstrap nginx 配置（Phase 12.3，首次部署 Certbot 签发证书前使用）
#
# 首次部署时 Let's Encrypt 证书尚未签发，主 nginx.conf 引用的证书文件不存在会导致 nginx 启动失败。
# 流程：
#   1. 首次部署用本配置启动 nginx（仅 HTTP 80，无 SSL）
#   2. 运行 Certbot 签发证书（webroot 模式，走 80 端口 acme-challenge）
#   3. 证书签发后切换回 nginx.conf（含 HTTPS），reload nginx
#
# 用法（docker-compose.prod.yml 中 nginx 服务首次启动）：
#   docker compose -f docker-compose.prod.yml up -d nginx
#   # 用 bootstrap 配置覆盖
#   docker compose -f docker-compose.prod.yml exec nginx sh -c \
#     "cp /etc/nginx/conf.d/nginx.bootstrap.conf /etc/nginx/conf.d/default.conf && nginx -s reload"
#   # Certbot 签发
#   certbot certonly --webroot -w /var/www/certbot -d ielts.example.com ...
#   # 切换回 HTTPS 配置
#   docker compose -f docker-compose.prod.yml exec nginx sh -c \
#     "cp /etc/nginx/conf.d/nginx.conf /etc/nginx/conf.d/default.conf && nginx -s reload"

server {
    listen 80;
    server_name _;

    # Certbot ACME 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 签发前：/api 反代 + user-web + admin-web（HTTP，供测试）
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 60m;
        proxy_read_timeout 120s;
    }

    location /admin/ {
        alias /usr/share/nginx/admin-web/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    location / {
        root /usr/share/nginx/user-web;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
